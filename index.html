<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qatar SIM Offer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0c2a4d 0%, #1e3a8a 100%);
      margin: 0;
      padding: 15px;
      min-height: 100vh;
    }
    .container {
      max-width: 650px;
      margin: 20px auto;
      background: white;
      color: #1e2937;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }
    .header {
      background: linear-gradient(135deg, #0284c8, #1e40af);
      padding: 50px 25px 40px;
      text-align: center;
    }
    .header h1 {
      margin: 0 0 10px 0;
      font-size: 36px;
      font-weight: 700;
      color: white;
    }
    .header p {
      margin: 0;
      font-size: 18px;
      color: white;
      opacity: 0.95;
    }
    .form-area {
      padding: 40px 30px;
    }
    label {
      display: block;
      margin: 20px 0 8px;
      font-weight: 600;
      color: #1e40af;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid #bfdbfe;
      border-radius: 14px;
      font-size: 17px;
      background: #f8fafc;
    }
    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
    }
    button:hover {
      transform: scale(1.02);
    }
    .result {
      display: none;
      margin: 25px 0;
      padding: 28px;
      background: #ecfdf5;
      border-radius: 18px;
      border-left: 7px solid #10b981;
    }
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .popup-content {
      background: white;
      padding: 45px 30px;
      border-radius: 24px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .ad-button {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      padding: 18px 50px;
      font-size: 20px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🇶🇦 Qatar SIM Offer</h1>
      <p>Ooredoo & Vodafone • Instant Checker</p>
    </div>
    
    <div class="form-area">
      <label>Select Network</label>
      <select id="simType">
        <option value="Ooredoo">Ooredoo Qatar</option>
        <option value="Vodafone">Vodafone Qatar</option>
      </select>

      <label>Enter Your Qatar Number</label>
      <input type="text" id="simNumber" placeholder="33123456" maxlength="8">

      <button onclick="checkOffer()">Check My Special Offers</button>

      <div id="result" class="result">
        <h3 id="offerTitle"></h3>
        <p id="offerDetails"></p>
      </div>
    </div>
  </div>

  <div id="welcomePopup" class="popup">
    <div class="popup-content">
      <h2 style="color:#1e40af;">🎉 Special Offer Ready!</h2>
      <p style="font-size:19px;">Claim your exclusive deal now</p>
      <button class="ad-button" onclick="goToAdsterra()">Claim Offer Now →</button>
    </div>
  </div>

  <script>
    function checkOffer() {
      const simType = document.getElementById('simType').value;
      const number = document.getElementById('simNumber').value.trim();
      
      if (number.length < 7) {
        alert("Please enter a valid Qatar number!");
        return;
      }
      
      document.getElementById('offerTitle').innerHTML = `${simType} - Special Offer for +974 ${number}`;
      document.getElementById('offerDetails').innerHTML = `✅ 200GB 5G Data<br>✅ Unlimited Calls & SMS<br>✅ Free Streaming<br>✅ 30 Days Validity`;
      document.getElementById('result').style.display = 'block';
      
      setTimeout(() => {
        document.getElementById('welcomePopup').style.display = 'flex';
      }, 1200);
    }

    function goToAdsterra() {
      window.open('https://www.effectivecpmnetwork.com/zm8r0fth?key=955665969461a274dca6fde3ee534be1', '_blank');
    }
  </script>
</body>
</html>
