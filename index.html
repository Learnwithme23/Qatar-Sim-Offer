<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qatar SIM Offer - Ooredoo & Vodafone</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0c2a4d 0%, #1e3a8a 100%);
      margin: 0;
      padding: 15px;
      color: #fff;
      min-height: 100vh;
    }
    .container {
      max-width: 650px;
      margin: 20px auto;
      background: rgba(255,255,255,0.97);
      color: #1e2937;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }
    .header {
      background: linear-gradient(135deg, #0284c8, #1e40af);
      padding: 45px 25px 35px;
      text-align: center;
      position: relative;
    }
    .header h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      font-weight: 700;
    }
    .header p {
      margin: 0;
      font-size: 18px;
      opacity: 0.95;
    }
    .form-area {
      padding: 40px 30px;
    }
    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 600;
      color: #1e40af;
      font-size: 15px;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid #bfdbfe;
      border-radius: 14px;
      font-size: 17px;
      background: #f8fafc;
    }
    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s;
    }
    button:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 30px rgba(16, 185, 129, 0.4);
    }
    .result {
      display: none;
      margin: 25px 0;
      padding: 28px;
      background: #ecfdf5;
      border-radius: 18px;
      border-left: 7px solid #10b981;
      font-size: 16.5px;
    }
    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .popup-content {
      background: white;
      padding: 50px 35px;
      border-radius: 28px;
      text-align: center;
      max-width: 440px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    }
    .ad-button {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      padding: 20px 55px;
      font-size: 21px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 25px 0 15px;
      box-shadow: 0 15px 35px rgba(245, 158, 11, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🇶🇦 Qatar SIM Offer</h1>
      <p>Ooredoo & Vodafone • Instant Offer Checker</p>
    </div>
    
    <div class="form-area">
      <label>Select Your Network</label>
      <select id="simType">
        <option value="Ooredoo">Ooredoo Qatar</option>
        <option value="Vodafone">Vodafone Qatar</option>
      </select>

      <label>Enter Your Qatar Number</label>
      <input type="text" id="simNumber" placeholder="33123456" maxlength="8">

      <button onclick="checkOffer()">🔍 Check My Special Offers</button>

      <div id="result" class="result">
        <h3 id="offerTitle" style="margin:0 0 15px 0; color:#10b981;"></h3>
        <p id="offerDetails"></p>
      </div>
    </div>
  </div>

  <div id="welcomePopup" class="popup">
    <div class="popup-content">
      <h2 style="color:#1e40af;">🎉 Congratulations!</h2>
      <p style="font-size:20px; color:#334155;">Your Exclusive Qatar Offer is Ready</p>
      <button class="ad-button" onclick="goToAdsterra()">Claim Offer Now →</button>
      <p style="font-size:14px; color:#64748b;">Limited Time Deal • Don't Miss It</p>
    </div>
  </div>

  <script>
    function checkOffer() {
      const simType = document.getElementById('simType').value;
      const number = document.getElementById('simNumber').value.trim();
      
      if (number.length < 7) {
        alert("Please enter a valid Qatar number (e.g. 33123456)");
        return;
      }
      
      document.getElementById('offerTitle').innerHTML = `${simType} Qatar - Special Offer for +974 ${number}`;
      document.getElementById('offerDetails').innerHTML = `
        ✅ <strong>200GB</strong> High-Speed 5G Data<br>
        ✅ Unlimited Local Calls & SMS<br>
        ✅ Free Netflix, YouTube & TikTok<br>
        ✅ Best International Rates<br><br>
        <strong>30 Days Validity</strong>
      `;
      document.getElementById('result').style.display = 'block';
      
      setTimeout(() => {
        document.getElementById('welcomePopup').style.display = 'flex';
      }, 1400);
    }

    function goToAdsterra() {
      window.open('https://www.effectivecpmnetwork.com/zm8r0fth?key=955665969461a274dca6fde3ee534be1', '_blank');
    }
  </script>
</body>
</html>
